name: "[Project] Campus Net Build Example"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: workbench/network/campus-net

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: workbench/network/campus-net/pyproject.toml
          python-version: "3.13"

      - name: Install project dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build CLI and GUI
        run: |
          uv run pyinstaller --clean --noconfirm build.spec
          uv run pyinstaller --clean --noconfirm gui.spec

      - name: Verify executables and GUI resources
        shell: pwsh
        run: |
          $cli = Resolve-Path -LiteralPath "dist/Auto-Connect-CampusNet.exe" -ErrorAction Stop
          $gui = Resolve-Path -LiteralPath "dist/Auto-Connect-CampusNet-GUI.exe" -ErrorAction Stop
          $smokeConfig = Join-Path $env:RUNNER_TEMP "campus-net-gui-smoke.json"
          $process = Start-Process -FilePath $gui -ArgumentList @("--smoke-test", "--config", $smokeConfig) -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "GUI smoke test failed with exit code $($process.ExitCode)"
          }
          if (Test-Path -LiteralPath $smokeConfig) {
            throw "GUI smoke test unexpectedly created $smokeConfig"
          }
          Get-FileHash -Algorithm SHA256 -LiteralPath $cli, $gui |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -LiteralPath "dist/SHA256SUMS.txt" -Encoding utf8NoBOM

      - name: Upload validated build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: campus-net-windows-${{ github.sha }}
          if-no-files-found: error
          path: |
            workbench/network/campus-net/dist/Auto-Connect-CampusNet.exe
            workbench/network/campus-net/dist/Auto-Connect-CampusNet-GUI.exe
            workbench/network/campus-net/dist/SHA256SUMS.txt

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["workbench"]
extend-exclude = [
  ".git",
  ".idea",
  ".venv",
  "venv",
  "env",
  "node_modules",
  "__pycache__",
  "build",
  "dist",
  "logs",
  "data",
  "downloads",
  "temp",
]

[tool.ruff.lint]
select = [
  "E4",
  "E7",
  "E9",
  "F",
  "I",
]
ignore = [
  "E501",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

name: "[Project] YouTube Auto Resume Extension CI"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/youtube-auto-resume-extension/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/project-youtube-auto-resume-extension-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/youtube-auto-resume-extension/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/project-youtube-auto-resume-extension-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --filter @cedarflake/youtube-auto-resume-extension --fail-if-no-match install --frozen-lockfile

      - name: Audit extension dependencies
        run: pnpm --config.registry=https://registry.npmjs.org/ --filter @cedarflake/youtube-auto-resume-extension --fail-if-no-match audit --audit-level high

      - name: Check extension
        run: pnpm --filter @cedarflake/youtube-auto-resume-extension --fail-if-no-match check

      - name: Build extension
        run: pnpm --filter @cedarflake/youtube-auto-resume-extension --fail-if-no-match build

      - name: Install Playwright browser
        run: pnpm --dir apps/youtube-auto-resume-extension exec playwright install --with-deps chromium

      - name: Test extension runtime
        run: pnpm --filter @cedarflake/youtube-auto-resume-extension --fail-if-no-match test:e2e

name: "[Group] Apps & Packages CI"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - ".editorconfig"
      - ".gitattributes"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/group-apps-packages-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - ".editorconfig"
      - ".gitattributes"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/group-apps-packages-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm --config.registry=https://registry.npmjs.org/ audit --prod --audit-level high

      - name: Check workspace
        run: |
          pnpm -r --filter "./apps/**" --filter "./packages/**" --if-present check
          pnpm check:focus-orb-package

      - name: Build workspace
        run: pnpm -r --workspace-concurrency=1 --filter "./apps/**" --filter "./packages/**" --if-present build

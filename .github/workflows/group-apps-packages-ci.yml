name: "[Group] Apps & Packages CI"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - ".editorconfig"
      - ".gitattributes"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/group-apps-packages-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - ".editorconfig"
      - ".gitattributes"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/group-apps-packages-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm --config.registry=https://registry.npmjs.org/ audit --prod --audit-level high

      - name: Check workspace
        run: |
          pnpm -r --filter "./apps/**" --filter "./packages/**" --if-present check
          pnpm check:focus-orb-package

      - name: Build workspace
        run: pnpm -r --workspace-concurrency=1 --filter "./apps/**" --filter "./packages/**" --if-present build

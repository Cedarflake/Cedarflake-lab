name: "[Project] YouTube Auto Resume CI"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "others/userscripts/youtube-auto-resume/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/project-youtube-auto-resume-ci.yml"
  push:
    branches:
      - main
    paths:
      - "others/userscripts/youtube-auto-resume/**"
      - "pnpm-workspace.yaml"
      - ".github/workflows/project-youtube-auto-resume-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --filter @cedarflake/youtube-auto-resume --fail-if-no-match install --frozen-lockfile

      - name: Check userscript version
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: pnpm --filter @cedarflake/youtube-auto-resume --fail-if-no-match version:check --base-ref="$BASE_REF"

      - name: Check userscript version on push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          BASE_REF: ${{ github.event.before }}
        run: pnpm --filter @cedarflake/youtube-auto-resume --fail-if-no-match version:check --base-ref="$BASE_REF"

      - name: Audit YouTube userscript dependencies
        run: pnpm --config.registry=https://registry.npmjs.org/ --filter @cedarflake/youtube-auto-resume --fail-if-no-match audit --audit-level high

      - name: Install Playwright browser
        run: pnpm --dir others/userscripts/youtube-auto-resume exec playwright install --with-deps chromium

      - name: Check YouTube userscript
        run: pnpm --filter @cedarflake/youtube-auto-resume --fail-if-no-match check

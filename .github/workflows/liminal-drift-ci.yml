name: Liminal Drift CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/liminal-drift/**"
      - ".github/workflows/liminal-drift-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/liminal-drift/**"
      - ".github/workflows/liminal-drift-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit Liminal Drift dependencies
        run: pnpm --config.registry=https://registry.npmjs.org/ --filter liminal-drift --fail-if-no-match audit --audit-level high

      - name: Check Liminal Drift
        run: pnpm --filter liminal-drift check

      - name: Install Playwright browser
        run: pnpm --dir apps/liminal-drift exec playwright install --with-deps chromium

      - name: Browser smoke checks
        id: browser-smoke
        shell: bash
        run: |
          set -euo pipefail

          app_dir="apps/liminal-drift"
          artifact_dir="$app_dir/artifacts"
          preview_url="http://127.0.0.1:4173/"

          test -f "$app_dir/dist/index.html"
          mkdir -p "$artifact_dir"

          pnpm --dir "$app_dir" exec vite preview \
            --host 127.0.0.1 \
            --port 4173 \
            --strictPort \
            > "$artifact_dir/vite-preview.log" 2>&1 &
          server_pid=$!
          cleanup_preview() {
            kill "$server_pid" 2>/dev/null || true
            wait "$server_pid" 2>/dev/null || true
          }
          trap cleanup_preview EXIT

          for attempt in {1..30}; do
            if curl --fail --silent "$preview_url" >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Vite server did not become ready" >&2
              cat "$artifact_dir/vite-preview.log" >&2
              exit 1
            fi
            sleep 1
          done

          set +e
          pnpm --dir "$app_dir" run check:canvas -- "$preview_url" \
            2>&1 | tee "$artifact_dir/check-canvas.log"
          canvas_status=${PIPESTATUS[0]}
          pnpm --dir "$app_dir" run check:interaction -- "$preview_url" \
            2>&1 | tee "$artifact_dir/check-interaction.log"
          interaction_status=${PIPESTATUS[0]}
          set -e

          if [ "$canvas_status" -ne 0 ] || [ "$interaction_status" -ne 0 ]; then
            echo "Browser smoke failed" >&2
            echo "::group::vite preview log"
            cat "$artifact_dir/vite-preview.log"
            echo "::endgroup::"
            echo "::group::canvas smoke log"
            cat "$artifact_dir/check-canvas.log"
            echo "::endgroup::"
            echo "::group::interaction smoke log"
            cat "$artifact_dir/check-interaction.log"
            echo "::endgroup::"
            exit 1
          fi

      - name: Upload browser artifacts
        if: ${{ always() && steps.browser-smoke.outcome != 'skipped' }}
        uses: actions/upload-artifact@v7
        with:
          name: liminal-drift-browser-smoke-${{ github.run_attempt }}
          path: apps/liminal-drift/artifacts/
          if-no-files-found: error
          retention-days: 7
